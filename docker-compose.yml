version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: produtomonitoradodb
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: telegrambotdb
    ports:
       - "5432:5432"
    volumes:
       - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: